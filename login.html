<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChinaTravel - Login</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        
        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }
        
        h1 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        
        .btn-login:hover {
            opacity: 0.9;
        }
        
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .error-msg {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
        
        .error-msg.show {
            display: block;
        }
        
        .link-to-close {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        
        .link-to-close:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Login</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <p id="errorMsg" class="error-msg"></p>
            <button type="submit" class="btn-login" id="btnLogin">Login</button>
        </form>
        <a href="close_account.html" class="link-to-close">Close Account (Already logged in?)</a>
    </div>

    <script>
        const API_BASE = 'https://app-api.chunhuo.net';
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const btnLogin = document.getElementById('btnLogin');
            
            errorMsg.classList.remove('show');
            errorMsg.textContent = '';
            btnLogin.disabled = true;
            btnLogin.textContent = 'Logging in...';
            
            try {
                const passwordMd5 = md5(password);
                const response = await fetch(API_BASE + '/user/mail/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        mail: email,
                        password: passwordMd5
                    })
                });
                
                const result = await response.json();
                
                if (result.code === '0' || result.code === 0 || (result.data && result.data.token)) {
                    const token = result.data?.token || result.data?.tpToken || '';
                    localStorage.setItem('china_travel_token', token);
                    localStorage.setItem('china_travel_user', JSON.stringify(result.data || {}));
                    window.location.href = 'close_account.html';
                } else {
                    errorMsg.textContent = result.msg || result.message || 'Login failed, please try again.';
                    errorMsg.classList.add('show');
                }
            } catch (err) {
                errorMsg.textContent = 'Network error. Please check your connection and try again.';
                errorMsg.classList.add('show');
            } finally {
                btnLogin.disabled = false;
                btnLogin.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
