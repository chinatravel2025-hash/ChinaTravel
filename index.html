<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChinaTravel App - 文档中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            background-color: #ffffff;
            padding: 50px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        
        .logo {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        
        .subtitle {
            font-size: 18px;
            color: #666;
            margin-bottom: 40px;
        }
        
        .documents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }
        
        .document-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 12px;
            padding: 30px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            display: block;
        }
        
        .document-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }
        
        .document-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }
        
        .document-card:hover::before {
            transform: scaleX(1);
        }
        
        .document-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .document-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #2c3e50;
        }
        
        .document-description {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }
        
        .privacy-card {
            background: linear-gradient(135deg, #e0f2fe 0%, #b3e5fc 100%);
        }
        
        .privacy-card .document-icon {
            color: #0277bd;
        }
        
        .agreement-card {
            background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
        }
        
        .agreement-card .document-icon {
            color: #e65100;
        }
        
        .footer {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid #e0e0e0;
            color: #999;
            font-size: 14px;
        }
        
        .company-name {
            font-weight: 600;
            color: #667eea;
            margin-top: 10px;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }
            
            .logo {
                font-size: 36px;
            }
            
            .documents-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .document-card {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">ChinaTravel</div>
        <div class="subtitle">文档中心 | Document Center</div>
        
        <div class="documents-grid">
            <a href="privacy_policy.html" class="document-card privacy-card">
                <div class="document-icon">🔒</div>
                <div class="document-title">隐私政策</div>
                <div class="document-description">
                    Privacy Policy<br>
                    了解我们如何收集、使用和保护您的个人信息
                </div>
            </a>
            
            <a href="user_agreement.html" class="document-card agreement-card">
                <div class="document-icon">📋</div>
                <div class="document-title">用户协议</div>
                <div class="document-description">
                    User Agreement<br>
                    使用本应用前请仔细阅读用户服务协议
                </div>
            </a>
        </div>
        
        <div class="footer">
            <p>&copy; 2025 Shanghai Chunhuo Information Technology Co., Ltd.</p>
            <p class="company-name">上海春火信息技术有限公司</p>
            <p style="margin-top: 10px;">All rights reserved.</p>
        </div>
    </div>
</body>
</html>
