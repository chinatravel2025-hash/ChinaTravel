plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}
apply plugin: 'kotlin-kapt'
kapt {
    generateStubs = true
}
apply plugin: 'kotlin-android'
android {
    namespace 'com.china.travel'
    compileSdk 33

    signingConfigs {
        debug {
            storeFile file('ct.jks')
            storePassword 'ct112233'
            keyAlias 'ct'
            keyPassword 'ct112233'
            v1SigningEnabled true
            v2SigningEnabled true
        }
        release {
            storeFile file('ct.jks')
            storePassword 'ct112233'
            keyAlias 'ct'
            keyPassword 'ct112233'
            v1SigningEnabled true
            v2SigningEnabled true
        }
    }
    defaultConfig {
        applicationId "com.china.travel"
        minSdk 24
        targetSdk 33
        versionCode 2
        versionName "1.0.0"
        ndk {
            //设置支持的SO库架构
            abiFilters "arm64-v8a", "armeabi-v7a", "x86" ,"x86_64"
        }
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        kapt {
            arguments {
                arg("AROUTER_MODULE_NAME", project.getName())
            }
        }
        signingConfig signingConfigs.release
    }
    buildTypes {
        debug {
            debuggable true
            minifyEnabled false
            zipAlignEnabled true  //压缩优化
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            jniDebuggable true

        }
        release {
            debuggable false
            minifyEnabled false   //开启混淆
            zipAlignEnabled true  //压缩优化
            shrinkResources false  //移出无用资源
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions {
        jvmTarget = '1.8'
    }
    buildFeatures {
        dataBinding = true
        viewBinding = true
    }

}

dependencies {
    implementation fileTree(include: ['*.jar', "*.aar"], dir: 'libs')
    implementation 'androidx.core:core-ktx:1.7.0'
    implementation 'androidx.appcompat:appcompat:1.4.1'
    implementation 'com.google.android.material:material:1.5.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.3'
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.3'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.4.0'
    implementation project(path: ':common:common_http')
    implementation project(path: ':common:common_base')
    implementation project(path: ':common:common_router')
    implementation project(path: ':module:user')
    implementation project(path: ':module:home')
    implementation project(path: ':module:guide')
    implementation project(path: ':module:community')
    implementation project(path: ':module:web')
    implementation project(path: ':lib:map')
    kapt Libs.arouter_compiler
    implementation 'androidx.navigation:navigation-fragment-ktx:2.4.1'
    implementation 'androidx.navigation:navigation-ui-ktx:2.4.1'

}