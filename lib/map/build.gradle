plugins {
    id 'com.android.library'
    id 'kotlin-android'
    id 'kotlin-kapt'
}

static def releaseTime() {
    return new Date().format("yyyy-MM-dd HH:MM", TimeZone.getTimeZone("GMT+8"))
}

android {
    namespace 'com.travel.map'
    compileSdk 33

    defaultConfig {
        minSdk 24
        targetSdk 33
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        consumerProguardFiles "consumer-rules.pro"
        kapt {
            arguments {
                arg("AROUTER_MODULE_NAME", project.getName())
            }
        }
        buildConfigField "String", "releaseTime", "\"${releaseTime()}\""
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions {
        jvmTarget = '1.8'
    }
    buildFeatures {
        buildConfig = true  // 启用 BuildConfig 以支持 buildConfigField
        dataBinding = true
        viewBinding = true
    }
}

dependencies {
   // api fileTree(include: ['*.jar'], dir: 'libs')
    implementation 'androidx.core:core-ktx:1.7.0'
    implementation 'androidx.appcompat:appcompat:1.4.1'
    implementation 'com.google.android.material:material:1.8.0'
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
    api project(':common:common_base')
    api project(':common:common_router')
    kapt Libs.arouter_compiler
    //定位
    // api 'com.amap.api:location:latest.integration'
      api 'com.amap.api:location:6.4.7'
    //搜索
    //  api 'com.amap.api:search:latest.integration'
      api 'com.amap.api:search:9.7.0'
      api 'com.amap.api:map2d:6.0.0'
}